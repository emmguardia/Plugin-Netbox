name: netbox-k3s-test

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: valkey/valkey:8-alpine
    command: valkey-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  netbox:
    image: netboxcommunity/netbox:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: "0123456789abcdefghijklmnopqrstuvwxyz0123456789abcdefABCDEF!!"
      ALLOWED_HOSTS: "*"
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
      REDIS_SSL: "false"
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_PORT: "6379"
      REDIS_CACHE_DATABASE: "1"
      REDIS_CACHE_SSL: "false"
      SKIP_STARTUP_SCRIPTS: "true"
      PYTHONPATH: /source
    ports:
      - "8080:8080"
    volumes:
      - ../netbox_k3s:/source/netbox_k3s
      - ../pyproject.toml:/source/pyproject.toml:ro
      - ../README.md:/source/README.md:ro
      - ./plugins.py:/etc/netbox/config/plugins.py:ro
      - ./start.sh:/start.sh:ro
      - ./seed.py:/seed.py:ro
    # Apply migrations, create admin/admin, seed demo data, then serve.
    entrypoint: ["/bin/sh", "-c"]
    command: ["sh /start.sh"]
